version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
      POSTGRES_DB: scheduler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://scheduler:scheduler@postgres:5432/scheduler
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Single replica by default. The worker holds no in-process concurrency -
  # run multiple concurrent workers via `docker compose up --scale worker=N`;
  # claim_job's Postgres row lock makes that safe against double-processing.
  # No fixed host port for metrics - a fixed mapping would conflict across
  # replicas when scaled. Compose assigns each replica its own random host
  # port instead; find it with `docker compose port worker 9100`.
  worker:
    build: ./worker
    ports:
      - "9100"
    environment:
      DATABASE_URL: postgresql://scheduler:scheduler@postgres:5432/scheduler
      REDIS_URL: redis://redis:6379/0
      METRICS_PORT: "9100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
